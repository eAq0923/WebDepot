<!DOCTYPE html>
<html>
    <head>
        <title>Community</title>
        <style>
            body{background:url('background.png');
                background-size:130% 100%;}
            body:hover{transform:rotate(15 deg)}

            a{display:block;
                width:400px;
                font-size:23.125px;
                color:#3469F9;
                text-decoration:none;
                text-align:center;
                margin:0 auto;}
            h1{text-align:center;
                color:#6600CC;
                font-size:42px;}
            p{text-align:center;
                background:#FF99CC;
                font-size:16.5px;}
            .smalltitle{background:none;
                font-size:28px;}
            .backlink{color:#27CFF5;
                      padding:10px 0;
                      font-size:21px;
                     }

            .tooltip{position:relative;
                    display:block;}
            .tooltip .tooltiptext{position:absolute;
                                display:block;
                                text-align:center;
    
                                width:200px;
                                height:0px;
                                font-size:14px;
                                background-color:#ADADAD;
                                color:white;
                                padding:4px 0;
                                border-radius:7px;
                                bottom:100%;
                                left:50%;
                                margin-left:-100px;
    
                                opacity:0;
                                transition: opacity 0.5s,
                                    width 0.5s,
                                    height 0.5s;                       
                               }
            .tooltip:hover .tooltiptext{opacity:0.85;
                                        
                                        height:18px;
                                       }                              
                    
            
        </style>
    </head>
  
    <body>
        <p class = 'smalltitle'>COMM</p>
        <a href='../index.html' class="backlink">Back</a>
    
        <a href='https://www.pinterest.com/' target = '_blank' class="tooltip">Pinterest
            <span class="tooltiptext">test fontsize blockwidth 2</span>
        </a>
    	<a href='https://discord.com/' target = '_blank'>Discord</a>
    	<a href='https://undertale.reactor.cc/' target = '_blank'>Deltarune Community</a>
        
  </body>
</html>
